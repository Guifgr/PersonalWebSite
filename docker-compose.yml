version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: guifgr-web
    restart: always
    ports:
      - "8082:80"
    volumes:
      # Puxa a pasta build do seu GitHub para dentro do Nginx
      - ./build:/usr/share/nginx/html:ro
      # Puxa o arquivo de configuração do seu GitHub para o Nginx
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro